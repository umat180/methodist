<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grace Methodist Church - Management System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#app{font-family:Georgia,serif;background:#f0f4f8;min-height:100vh;}
.login-bg{min-height:100vh;background:linear-gradient(135deg,#0a2540,#1a3a5c);display:flex;align-items:center;justify-content:center;padding:1rem;}
.login-box{background:white;border-radius:16px;padding:2rem;width:100%;max-width:380px;}
.login-icon{text-align:center;margin-bottom:0.5rem;}
.login-icon img{width:90px;height:90px;border-radius:12px;}
.login-title{font-size:1.3rem;font-weight:700;color:#0a2540;text-align:center;}
.login-sub{font-size:0.75rem;color:#888;text-align:center;margin-bottom:1rem;}
.flabel{display:block;font-size:0.78rem;font-weight:700;color:#444;margin-bottom:0.3rem;margin-top:0.75rem;}
.finput{width:100%;padding:0.55rem 0.8rem;border:1.5px solid #ddd;border-radius:8px;font-size:0.88rem;outline:none;}
.finput:focus{border-color:#1a3a5c;}
.btn-login{width:100%;margin-top:1rem;padding:0.7rem;background:#0a2540;color:white;border:none;border-radius:8px;font-size:0.9rem;font-weight:700;cursor:pointer;}
.btn-login:hover{background:#1a3a5c;}
.btn-link{background:none;border:none;color:#1a3a5c;font-size:0.78rem;cursor:pointer;text-decoration:underline;margin-top:0.75rem;display:block;text-align:center;}
.login-err{background:#fdecea;color:#c0392b;border-radius:6px;padding:0.5rem 0.75rem;font-size:0.78rem;margin-top:0.6rem;display:none;}
.topbar{background:#0a2540;color:white;padding:0.6rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-logo{width:36px;height:36px;border-radius:8px;margin-right:10px;}
.topbar-title{font-size:0.95rem;font-weight:700;}
.topbar-sub{font-size:0.68rem;color:#aac4e0;}
.btn-out{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;padding:0.3rem 0.7rem;border-radius:6px;font-size:0.72rem;cursor:pointer;}
.layout{display:flex;min-height:calc(100vh - 52px);}
.sidebar{width:200px;background:white;border-right:1px solid #e0e6ed;overflow-y:auto;flex-shrink:0;}
.nsec{padding:0.6rem 0.75rem 0.2rem;font-size:0.62rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.08em;}
.nbtn{display:block;width:calc(100% - 8px);margin:1px 4px;text-align:left;padding:0.45rem 0.7rem;font-size:0.78rem;color:#444;background:none;border:none;cursor:pointer;border-radius:6px;}
.nbtn:hover{background:#f0f4f8;color:#0a2540;}
.nbtn.act{background:#e8f0fa;color:#0a2540;font-weight:700;border-left:3px solid #d4a017;}
.gbtn{display:block;width:calc(100% - 8px);margin:1px 4px;text-align:left;padding:0.35rem 0.7rem;font-size:0.73rem;color:#555;background:none;border:none;cursor:pointer;border-radius:5px;}
.gbtn:hover{background:#f5f7fa;}
.gbtn.act{background:#fdf3dc;color:#7a5500;font-weight:700;border-left:3px solid #d4a017;}
.main{flex:1;padding:1rem;overflow-y:auto;min-width:0;}
.ph{background:linear-gradient(135deg,#0a2540,#1a3a5c);color:white;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;}
.ph h2{font-size:1.15rem;font-weight:700;}
.ph p{font-size:0.75rem;color:#aac4e0;margin-top:0.2rem;}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:0.6rem;margin-bottom:1rem;}
.scard{background:white;border-radius:8px;padding:0.75rem;border:1px solid #e0e6ed;}
.slabel{font-size:0.68rem;color:#888;font-weight:700;}
.sval{font-size:1.6rem;font-weight:700;margin-top:0.15rem;}
.sv-blue{color:#1a3a5c;}.sv-green{color:#2e7d32;}.sv-amber{color:#b8860b;}.sv-red{color:#c0392b;}
.card{background:white;border-radius:10px;border:1px solid #e0e6ed;margin-bottom:1rem;overflow:hidden;}
.ch{padding:0.65rem 1rem;border-bottom:1px solid #e0e6ed;font-weight:700;font-size:0.82rem;color:#0a2540;display:flex;align-items:center;justify-content:space-between;}
table{width:100%;border-collapse:collapse;font-size:0.78rem;}
th{background:#f7f9fc;padding:0.5rem 0.7rem;text-align:left;font-size:0.68rem;font-weight:700;color:#666;border-bottom:1px solid #e0e6ed;}
td{padding:0.5rem 0.7rem;border-bottom:1px solid #f0f3f6;color:#333;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafbfd;}
.badge{display:inline-block;padding:0.18rem 0.45rem;border-radius:20px;font-size:0.65rem;font-weight:700;}
.bg{background:#e8f5e9;color:#2e7d32;}.br{background:#fdecea;color:#c0392b;}
.bb{background:#e3f0fb;color:#1a3a5c;}.ba{background:#fff8e1;color:#8a6000;}.bgr{background:#f0f0f0;color:#666;}
.btn-add{display:inline-flex;align-items:center;gap:0.3rem;padding:0.45rem 0.9rem;background:#0a2540;color:white;border:none;border-radius:7px;font-size:0.78rem;font-weight:700;cursor:pointer;margin-bottom:0.75rem;}
.btn-add:hover{background:#1a3a5c;}
.btn-del{padding:0.28rem 0.55rem;background:#fdecea;color:#c0392b;border:none;border-radius:5px;font-size:0.7rem;font-weight:700;cursor:pointer;}
.btn-del:hover{background:#ffcdd2;}
.att-row{display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1rem;border-bottom:1px solid #f0f3f6;}
.att-row:last-child{border-bottom:none;}
.att-name{font-size:0.84rem;font-weight:700;color:#222;}
.att-sub{font-size:0.7rem;color:#888;}
.att-btns{display:flex;gap:0.4rem;}
.abtn{padding:0.38rem 0.85rem;border:none;border-radius:6px;font-size:0.75rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.abtn-p{background:#e8f5e9;color:#2e7d32;border:1.5px solid #c8e6c9;}
.abtn-p.on{background:#2e7d32;color:white;border-color:#2e7d32;}
.abtn-a{background:#fdecea;color:#c0392b;border:1.5px solid #ffcdd2;}
.abtn-a.on{background:#c0392b;color:white;border-color:#c0392b;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:1.5rem 1rem;overflow-y:auto;}
.modal{background:white;border-radius:14px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
.mh{padding:0.85rem 1.1rem;border-bottom:1px solid #e0e6ed;display:flex;justify-content:space-between;align-items:center;}
.mh h3{font-size:0.95rem;font-weight:700;color:#0a2540;}
.mcl{background:none;border:none;font-size:1.1rem;cursor:pointer;color:#888;}
.mb{padding:1.1rem;}
.cbgrp{max-height:150px;overflow-y:auto;border:1px solid #ddd;border-radius:8px;padding:0.4rem;}
.cblbl{display:flex;align-items:center;gap:0.5rem;padding:0.22rem 0.25rem;font-size:0.77rem;cursor:pointer;}
.cblbl:hover{background:#f5f7fa;border-radius:4px;}
.alert-o{background:#fff8e6;border-left:4px solid #f59e0b;color:#78500a;border-radius:7px;padding:0.6rem 0.9rem;margin-bottom:0.75rem;font-size:0.78rem;}
.alert-r{background:#fdecea;border-left:4px solid #e53935;color:#7a1515;border-radius:7px;padding:0.6rem 0.9rem;margin-bottom:0.75rem;font-size:0.78rem;}
.alert-g{background:#e8f5e9;border-left:4px solid #2e7d32;color:#1b5e20;border-radius:7px;padding:0.6rem 0.9rem;margin-bottom:0.75rem;font-size:0.78rem;}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:0.82rem;}
.date-row{display:flex;gap:0.75rem;align-items:flex-end;flex-wrap:wrap;margin-bottom:1rem;}
.date-row label{font-size:0.75rem;font-weight:700;color:#555;display:block;margin-bottom:0.25rem;}
.date-row input[type=date]{padding:0.4rem 0.6rem;border:1.5px solid #ddd;border-radius:7px;font-size:0.78rem;outline:none;}
.btn-gen{padding:0.42rem 0.9rem;background:#0a2540;color:white;border:none;border-radius:7px;font-size:0.78rem;font-weight:700;cursor:pointer;}
.grp-card{padding:0.75rem 1rem;background:#f7f9fc;border:1px solid #e0e6ed;border-radius:8px;cursor:pointer;transition:all 0.15s;margin-bottom:0.5rem;display:flex;justify-content:space-between;align-items:center;}
.grp-card:hover{background:#e8f0fa;border-color:#1a3a5c;}
.grp-pill{display:inline-block;padding:0.13rem 0.4rem;background:#e3f0fb;color:#1a3a5c;border-radius:20px;font-size:0.62rem;font-weight:600;margin:1px;}
.back-btn{display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.75rem;background:#f0f4f8;color:#0a2540;border:1px solid #e0e6ed;border-radius:6px;font-size:0.75rem;font-weight:700;cursor:pointer;margin-bottom:0.75rem;}
.back-btn:hover{background:#e0e6ed;}
.srch{padding:0.4rem 0.7rem;border:1.5px solid #ddd;border-radius:7px;font-size:0.78rem;outline:none;}
.srch:focus{border-color:#1a3a5c;}
.divider{border:none;border-top:1px solid #e0e6ed;margin:1rem 0;}
</style>
</head>

// Stored credentials (hashed with simple obfuscation — changeable at runtime)
let CREDS = {u:'methodist', p:'church1234'};
try{ const c=localStorage.getItem('gmc_creds'); if(c){ const o=JSON.parse(atob(c)); CREDS=o; } }catch(e){}
function saveCreds(){ try{ localStorage.setItem('gmc_creds', btoa(JSON.stringify(CREDS))); }catch(e){} }

let S={user:null,page:'dashboard',grp:null,members:[],attendance:[],modal:null,attDate:''};
S.attDate = today();

async function load(){
  try{
    const [m,a]=await Promise.all([
      window.storage.get('gmc_members',true).catch(()=>null),
      window.storage.get('gmc_attendance',true).catch(()=>null)
    ]);
    S.members=m?JSON.parse(m.value):[];
    S.attendance=a?JSON.parse(a.value):[];
  }catch(e){S.members=[];S.attendance=[];}
  render();
}
async function saveM(){try{await window.storage.set('gmc_members',JSON.stringify(S.members),true);}catch(e){}}
async function saveA(){try{await window.storage.set('gmc_attendance',JSON.stringify(S.attendance),true);}catch(e){}}

function today(){return new Date().toISOString().split('T')[0];}
function fmt(d){if(!d)return ''; const p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0];}
function gm(grp){const g=grp||S.grp;return g?S.members.filter(m=>m.groups&&m.groups.includes(g)):[];}

// ===== AUTH =====
function login(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  const err=document.getElementById('lerr');
  if(u===CREDS.u && p===CREDS.p){
    S.user=true; S.page='dashboard'; render();
  } else {
    err.style.display='block';
    err.textContent='Incorrect username or password.';
  }
}
function logout(){S.user=null;S.page='login';S.grp=null;render();}

function showChangePw(){
  document.getElementById('login-form').style.display='none';
  document.getElementById('changepw-form').style.display='block';
}
function hideChangePw(){
  document.getElementById('login-form').style.display='block';
  document.getElementById('changepw-form').style.display='none';
  document.getElementById('cpwerr').style.display='none';
  document.getElementById('cpwok').style.display='none';
}
function doChangePw(){
  const ou=document.getElementById('cpu').value.trim();
  const op=document.getElementById('cpp').value;
  const np=document.getElementById('cpnp').value;
  const cp=document.getElementById('cpcp').value;
  const err=document.getElementById('cpwerr');
  const ok=document.getElementById('cpwok');
  err.style.display='none'; ok.style.display='none';
  if(ou!==CREDS.u||op!==CREDS.p){err.textContent='Current username or password is wrong.';err.style.display='block';return;}
  if(np.length<6){err.textContent='New password must be at least 6 characters.';err.style.display='block';return;}
  if(np!==cp){err.textContent='New passwords do not match.';err.style.display='block';return;}
  CREDS.p=np; saveCreds();
  ok.style.display='block';
  setTimeout(hideChangePw,1500);
}

// ===== NAV =====
function nav(page,grp){
  S.page=page;
  if(grp!==undefined) S.grp=grp;
  render();
}
function closeModal(){S.modal=null;render();}
function openAdd(){S.modal='add';render();}

// ===== MEMBERS =====
function addMember(){
  const n=document.getElementById('mn').value.trim();
  const ph=document.getElementById('mph').value.trim();
  if(!n){alert('Name is required');return;}
  const gs=Array.from(document.querySelectorAll('.gcb:checked')).map(c=>c.value);
  if(!gs.length){alert('Select at least one group');return;}
  S.members.push({id:Date.now(),name:n,phone:ph,groups:gs,joined:today()});
  saveM(); closeModal();
}
function delMember(id){
  if(!confirm('Remove this member?'))return;
  S.members=S.members.filter(m=>m.id!==id);
  S.attendance=S.attendance.filter(a=>a.mid!==id);
  saveM(); saveA(); render();
}

// ===== ATTENDANCE =====
function setAttDate(d){S.attDate=d;render();}
function markAtt(mid,status){
  const date=S.attDate;
  const idx=S.attendance.findIndex(a=>a.mid===mid&&a.date===date&&a.grp===S.grp);
  if(idx>=0) S.attendance[idx].status=status;
  else S.attendance.push({mid,date,grp:S.grp,status});
  saveA(); render();
}
function getAtt(mid,date,grp){
  const r=S.attendance.find(a=>a.mid===mid&&a.date===date&&a.grp===grp);
  return r?r.status:'';
}

// ===== RENDER =====
function render(){
  const app=document.getElementById('app');
  if(!S.user){app.innerHTML=rLogin();return;}
  let main='';
  switch(S.page){
    case 'dashboard': main=rDashboard();break;
    case 'members': main=rMembers();break;
    case 'group-mem': main=rGroupMem();break;
    case 'group-att': main=rGroupAtt();break;
    case 'attendance': main=rAttendance();break;
    case 'reports': main=rReports();break;
    default: main=rDashboard();
  }
  app.innerHTML=`
    <div class="topbar">
      <div style="display:flex;align-items:center;">
        <img src="${LOGO_URL}" class="topbar-logo" alt="Logo">
        <div>
          <div class="topbar-title">Grace Methodist Church</div>
          <div class="topbar-sub">Deduako-Kodiekrom</div>
        </div>
      </div>
      <button class="btn-out" onclick="logout()">Sign Out</button>
    </div>
    <div class="layout">${rSidebar()}<div class="main">${main}</div></div>
    ${rModal()}`;
}

function rLogin(){return `
  <div class="login-bg">
    <div class="login-box">
      <div class="login-icon"><img src="${LOGO_URL}" alt="Grace Methodist"></div>
      <div class="login-title">Grace Methodist Church</div>
      <div class="login-sub">Deduako-Kodiekrom &middot; Management System</div>

      <div id="login-form">
        <label class="flabel">Username</label>
        <input class="finput" id="lu" placeholder="Enter username" autocomplete="username"/>
        <label class="flabel">Password</label>
        <input class="finput" id="lp" type="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
        <div class="login-err" id="lerr"></div>
        <button class="btn-login" onclick="login()">Sign In</button>
        <button class="btn-link" onclick="showChangePw()">&#128274; Change Password</button>
      </div>

      <div id="changepw-form" style="display:none;">
        <hr class="divider">
        <div style="font-size:0.82rem;font-weight:700;color:#0a2540;margin-bottom:0.5rem;">&#128274; Change Password</div>
        <label class="flabel">Current Username</label>
        <input class="finput" id="cpu" placeholder="Username" autocomplete="username"/>
        <label class="flabel">Current Password</label>
        <input class="finput" id="cpp" type="password" placeholder="Current password" autocomplete="current-password"/>
        <label class="flabel">New Password</label>
        <input class="finput" id="cpnp" type="password" placeholder="New password (min 6 chars)" autocomplete="new-password"/>
        <label class="flabel">Confirm New Password</label>
        <input class="finput" id="cpcp" type="password" placeholder="Confirm new password" autocomplete="new-password"/>
        <div class="login-err" id="cpwerr" style="display:none;"></div>
        <div class="alert-g" id="cpwok" style="display:none;">&#10003; Password changed successfully!</div>
        <button class="btn-login" onclick="doChangePw()">Update Password</button>
        <button class="btn-link" onclick="hideChangePw()">&larr; Back to Login</button>
      </div>
    </div>
  </div>`;}

function rSidebar(){
  const p=S.page,g=S.grp;
  const nb=(page,grp,label)=>{
    const active=(p===page&&(grp===undefined||g===grp))?'act':'';
    const grpArg=grp!==undefined?`'${grp}'`:'';
    const call=grpArg?`nav('${page}',${grpArg})`:`nav('${page}')`;
    return `<button class="nbtn ${active}" onclick="${call}">${label}</button>`;
  };
  const gb=(grp)=>{
    const active=(p==='group-mem'&&g===grp||p==='group-att'&&g===grp)?'act':'';
    return `<button class="gbtn ${active}" onclick="nav('group-mem','${grp}')">${grp}</button>`;
  };
  return `<div class="sidebar">
    <div class="nsec">Main</div>
    ${nb('dashboard',undefined,'&#9642; Dashboard')}
    ${nb('members',undefined,'&#9642; All Members')}
    ${nb('attendance',undefined,'&#9642; Take Attendance')}
    ${nb('reports',undefined,'&#9642; Reports')}
    <div class="nsec">Groups</div>
    ${GROUPS.map(gb).join('')}
  </div>`;}

function rDashboard(){
  const total=S.members.length;
  const todayStr=today();
  const todayAtt=S.attendance.filter(a=>a.date===todayStr);
  const present=todayAtt.filter(a=>a.status==='P').length;
  const absent=todayAtt.filter(a=>a.status==='A').length;
  const grpSizes=GROUPS.map(g=>({g,c:gm(g).length})).sort((a,b)=>b.c-a.c);
  return `
    <div class="ph"><h2>&#9962; Dashboard</h2><p>Welcome back &mdash; ${new Date().toDateString()}</p></div>
    <div class="grid4">
      <div class="scard"><div class="slabel">TOTAL MEMBERS</div><div class="sval sv-blue">${total}</div></div>
      <div class="scard"><div class="slabel">PRESENT TODAY</div><div class="sval sv-green">${present}</div></div>
      <div class="scard"><div class="slabel">ABSENT TODAY</div><div class="sval sv-red">${absent}</div></div>
      <div class="scard"><div class="slabel">GROUPS</div><div class="sval sv-amber">${GROUPS.length}</div></div>
    </div>
    <div class="card">
      <div class="ch">Group Membership Overview</div>
      <table><thead><tr><th>Group</th><th>Members</th></tr></thead><tbody>
      ${grpSizes.map(({g,c})=>`<tr><td><button class="btn-link" style="font-size:0.78rem;font-weight:600;" onclick="nav('group-mem','${g}')">${g}</button></td><td><span class="badge bb">${c}</span></td></tr>`).join('')}
      </tbody></table>
    </div>`;}

function rMembers(){
  const srch=(document.getElementById('msrch')||{}).value||'';
  const filtered=S.members.filter(m=>m.name.toLowerCase().includes(srch.toLowerCase())||m.phone&&m.phone.includes(srch));
  return `
    <div class="ph"><h2>&#128101; All Members</h2><p>${S.members.length} registered member${S.members.length!==1?'s':''}</p></div>
    <div style="display:flex;gap:0.5rem;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap;">
      <button class="btn-add" onclick="openAdd()">&#43; Add Member</button>
      <input class="srch" id="msrch" placeholder="Search name or phone..." oninput="render()" value="${srch}">
    </div>
    <div class="card">
      <table><thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Groups</th><th>Joined</th><th></th></tr></thead><tbody>
      ${filtered.length?filtered.map((m,i)=>`<tr>
        <td>${i+1}</td>
        <td style="font-weight:700;">${esc(m.name)}</td>
        <td>${esc(m.phone||'—')}</td>
        <td>${(m.groups||[]).map(g=>`<span class="grp-pill">${g}</span>`).join('')||'—'}</td>
        <td>${fmt(m.joined)}</td>
        <td><button class="btn-del" onclick="delMember(${m.id})">Remove</button></td>
      </tr>`).join(''): '<tr><td colspan="6" class="empty">No members found</td></tr>'}
      </tbody></table>
    </div>`;}

function rGroupMem(){
  const members=gm();
  return `
    <button class="back-btn" onclick="nav('dashboard')">&larr; Dashboard</button>
    <div class="ph"><h2>&#128101; ${S.grp}</h2><p>${members.length} member${members.length!==1?'s':''}</p></div>
    <div style="margin-bottom:0.75rem;display:flex;gap:0.5rem;">
      <button class="btn-add" onclick="openAdd()">&#43; Add Member</button>
      <button class="btn-gen" onclick="nav('group-att',S.grp)">&#128203; Take Attendance</button>
    </div>
    <div class="card">
      <table><thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Joined</th><th></th></tr></thead><tbody>
      ${members.length?members.map((m,i)=>`<tr>
        <td>${i+1}</td>
        <td style="font-weight:700;">${esc(m.name)}</td>
        <td>${esc(m.phone||'—')}</td>
        <td>${fmt(m.joined)}</td>
        <td><button class="btn-del" onclick="delMember(${m.id})">Remove</button></td>
      </tr>`).join(''):`<tr><td colspan="5" class="empty">No members in this group yet.<br><button class="btn-add" style="margin-top:0.5rem;" onclick="openAdd()">Add Member</button></td></tr>`}
      </tbody></table>
    </div>`;}

function rGroupAtt(){
  const members=gm();
  const date=S.attDate||today();
  const pCount=members.filter(m=>getAtt(m.id,date,S.grp)==='P').length;
  const aCount=members.filter(m=>getAtt(m.id,date,S.grp)==='A').length;
  return `
    <button class="back-btn" onclick="nav('group-mem',S.grp)">&larr; ${S.grp}</button>
    <div class="ph"><h2>&#128203; Attendance &mdash; ${S.grp}</h2><p>${fmt(date)} &middot; Present: ${pCount} &middot; Absent: ${aCount}</p></div>
    <div class="date-row">
      <div><label>Date</label><input type="date" value="${date}" onchange="setAttDate(this.value)" max="${today()}"></div>
    </div>
    ${members.length===0?'<div class="empty">No members in this group.</div>':'<div class="card">'+members.map(m=>{
      const st=getAtt(m.id,date,S.grp);
      return `<div class="att-row">
        <div><div class="att-name">${esc(m.name)}</div><div class="att-sub">${m.phone||''}</div></div>
        <div class="att-btns">
          <button class="abtn abtn-p ${st==='P'?'on ':'' }" onclick="markAtt(${m.id},'P')">Present</button>
          <button class="abtn abtn-a ${st==='A'?'on ':'' }" onclick="markAtt(${m.id},'A')">Absent</button>
        </div>
      </div>`;
    }).join('')+'</div>'}
  `;}

function rAttendance(){
  // Show all groups attendance summary
  const date=S.attDate||today();
  return `
    <div class="ph"><h2>&#128203; Attendance Overview</h2><p>Select a group to take attendance</p></div>
    <div class="date-row">
      <div><label>Date</label><input type="date" value="${date}" onchange="setAttDate(this.value)" max="${today()}"></div>
    </div>
    <div>
    ${GROUPS.map(g=>{
      const members=gm(g);
      const pCount=members.filter(m=>getAtt(m.id,date,g)==='P').length;
      const aCount=members.filter(m=>getAtt(m.id,date,g)==='A').length;
      const unmarked=members.length-pCount-aCount;
      return `<div class="grp-card" onclick="nav('group-att','${g}')">
        <div>
          <div style="font-weight:700;font-size:0.84rem;">${g}</div>
          <div style="font-size:0.7rem;color:#888;margin-top:0.2rem;">${members.length} members</div>
        </div>
        <div style="display:flex;gap:0.4rem;align-items:center;">
          ${pCount?`<span class="badge bg">P:${pCount}</span>`:''}
          ${aCount?`<span class="badge br">A:${aCount}</span>`:''}
          ${unmarked?`<span class="badge bgr">${unmarked} pending</span>`:''}
          <span style="color:#aaa;font-size:1rem;">&rsaquo;</span>
        </div>
      </div>`;
    }).join('')}
    </div>`;}

function rReports(){
  const from=document.getElementById('rfrom')?document.getElementById('rfrom').value:'';
  const to=document.getElementById('rto')?document.getElementById('rto').value:'';
  let rows='';
  if(from&&to){
    GROUPS.forEach(g=>{
      const members=gm(g);
      members.forEach(m=>{
        const attRecs=S.attendance.filter(a=>a.mid===m.id&&a.grp===g&&a.date>=from&&a.date<=to);
        const p=attRecs.filter(a=>a.status==='P').length;
        const a=attRecs.filter(a=>a.status==='A').length;
        if(p+a>0) rows+=`<tr><td style="font-weight:700;">${esc(m.name)}</td><td>${g}</td><td><span class="badge bg">${p}</span></td><td><span class="badge br">${a}</span></td><td>${p+a}</td></tr>`;
      });
    });
  }
  return `
    <div class="ph"><h2>&#128196; Reports</h2><p>Attendance summary by date range</p></div>
    <div class="date-row">
      <div><label>From</label><input type="date" id="rfrom" value="${from}" oninput="render()"></div>
      <div><label>To</label><input type="date" id="rto" value="${to}" oninput="render()"></div>
    </div>
    ${from&&to?`<div class="card"><table><thead><tr><th>Member</th><th>Group</th><th>Present</th><th>Absent</th><th>Total Days</th></tr></thead><tbody>
      ${rows||'<tr><td colspan="5" class="empty">No attendance records in this range</td></tr>'}
    </tbody></table></div>`:`<div class="alert-o">Select a date range above to generate the report.</div>`}`;}

function rModal(){
  if(!S.modal) return '';
  const grpChecks=GROUPS.map(g=>`<label class="cblbl"><input type="checkbox" class="gcb" value="${g}"> ${g}</label>`).join('');
  return `<div class="modal-ov" onclick="if(event.target.classList.contains('modal-ov'))closeModal()">
    <div class="modal">
      <div class="mh"><h3>Add New Member</h3><button class="mcl" onclick="closeModal()">&#10005;</button></div>
      <div class="mb">
        <label class="flabel">Full Name *</label>
        <input class="finput" id="mn" placeholder="Enter full name" autocomplete="off"/>
        <label class="flabel">Phone Number</label>
        <input class="finput" id="mph" placeholder="e.g. 0241234567" autocomplete="off"/>
        <label class="flabel">Groups *</label>
        <div class="cbgrp">${grpChecks}</div>
        ${S.grp?`<script>setTimeout(()=>{document.querySelectorAll('.gcb').forEach(c=>{if(c.value==='${S.grp}')c.checked=true;});},10)<\/script>`:''}
        <button class="btn-add" style="margin-top:1rem;width:100%;justify-content:center;" onclick="addMember()">&#43; Add Member</button>
      </div>
    </div>
  </div>`;}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

load();
</script>
</body>
</html>
